openapi: 3.0.3
info:
  title: Reading Rewards - Reward Customization API
  version: 0.1.0
  description: Contracts for customizable rewards, child selection, earnings, settlement requests, and messaging.
paths:
  /api/families/{familyId}/reward-options:
    get:
      summary: List family-level reward options
      parameters:
        - in: path
          name: familyId
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Family reward options
    post:
      summary: Create family-level reward option
      responses:
        '201':
          description: Created
  /api/children/{childId}/reward-options:
    get:
      summary: List additive reward options visible to child
      description: Returns active family options plus active child-specific options.
      responses:
        '200':
          description: Additive visible options
  /api/children/{childId}/reward-selection:
    put:
      summary: Set active reward selection for child
      responses:
        '200':
          description: Active selection updated
  /api/children/{childId}/reward-ledgers:
    get:
      summary: List child balances grouped by reward unit type
      responses:
        '200':
          description: Unit-specific balances and summaries
  /api/children/{childId}/settlement-requests:
    post:
      summary: Child requests payout or spend
      responses:
        '201':
          description: Request created in pending state
  /api/settlement-requests/{requestId}/approve:
    post:
      summary: Parent approves child settlement request
      responses:
        '200':
          description: Request approved and ledger finalized
  /api/settlement-requests/{requestId}/reject:
    post:
      summary: Parent rejects child settlement request
      responses:
        '200':
          description: Request rejected
  /api/children/{childId}/messages/nudge:
    post:
      summary: Child sends nudge to parent
      description: Enforces one nudge per child per 24 hours; triggers parent email notification.
      responses:
        '201':
          description: Nudge created
        '429':
          description: Nudge cooldown active
  /api/parents/{parentId}/messages/encouragement:
    post:
      summary: Parent sends encouragement to child
      description: In-app only, no email delivery to child.
      responses:
        '201':
          description: Encouragement created
components:
  schemas:
    RewardOption:
      type: object
      required: [id, scopeType, unitType, earningBasis, payoutValue, isActive]
      properties:
        id:
          type: string
          format: uuid
        scopeType:
          type: string
          enum: [FAMILY, CHILD]
        scopeChildId:
          type: string
          format: uuid
          nullable: true
        name:
          type: string
        unitType:
          type: string
          enum: [MONEY_USD, SCREEN_MINUTES, NINTENDO_MINUTES, CUSTOM_UNIT]
        earningBasis:
          type: string
          enum: [PER_CHAPTER, PER_BOOK, PER_PAGE_MILESTONE]
        payoutValue:
          type: number
        pageMilestoneSize:
          type: integer
          nullable: true
        isActive:
          type: boolean
    RewardLedgerSummary:
      type: object
      required: [unitType, availableBalance]
      properties:
        unitType:
          type: string
        availableBalance:
          type: number
        pendingPayoutBalance:
          type: number
    SettlementRequest:
      type: object
      required: [id, requestType, status, requestedAmount]
      properties:
        id:
          type: string
          format: uuid
        requestType:
          type: string
          enum: [PAYOUT, SPEND]
        status:
          type: string
          enum: [PENDING, APPROVED, REJECTED, CANCELLED]
        requestedAmount:
          type: number
